{% extends "base.html" %}

{% block title %}Entrar — ProfessorDash{% endblock %}

{% block body %}
<div class="min-h-screen flex items-center justify-center bg-zinc-950 px-4">
  <div class="w-full max-w-sm">

    <!-- Logo / título -->
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold tracking-tight text-zinc-100">ProfessorDash</h1>
      <p class="mt-1 text-sm text-zinc-400">Acesso restrito ao professor</p>
    </div>

    <!-- Card -->
    <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-8 shadow-xl">

      {% if form.errors %}
      <div class="mb-4 rounded-lg bg-red-900/40 border border-red-700 px-4 py-3 text-sm text-red-300">
        Usuário ou senha incorretos. Tente novamente.
      </div>
      {% endif %}

      <form method="post" novalidate>
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}">

        <div class="space-y-4">
          <!-- Email / usuário -->
          <div>
            <label for="id_username" class="block text-sm font-medium text-zinc-300 mb-1">
              E-mail
            </label>
            <input
              id="id_username"
              name="username"
              type="text"
              autocomplete="username"
              required
              autofocus
              class="w-full rounded-lg bg-zinc-800 border border-zinc-700 px-3 py-2 text-sm text-zinc-100
                     placeholder-zinc-500 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent
                     transition"
              placeholder="professor@seed.pr.gov.br"
            >
          </div>

          <!-- Senha -->
          <div>
            <label for="id_password" class="block text-sm font-medium text-zinc-300 mb-1">
              Senha
            </label>
            <input
              id="id_password"
              name="password"
              type="password"
              autocomplete="current-password"
              required
              class="w-full rounded-lg bg-zinc-800 border border-zinc-700 px-3 py-2 text-sm text-zinc-100
                     placeholder-zinc-500 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent
                     transition"
              placeholder="••••••••"
            >
          </div>
        </div>

        <button
          type="submit"
          class="mt-6 w-full rounded-lg bg-cyan-600 hover:bg-cyan-500 active:bg-cyan-700
                 px-4 py-2 text-sm font-semibold text-white transition-colors focus:outline-none
                 focus:ring-2 focus:ring-cyan-500 focus:ring-offset-2 focus:ring-offset-zinc-900">
          Entrar
        </button>
      </form>
    </div>

    <!-- Divider -->
    <div class="my-6 flex items-center gap-3">
      <div class="flex-1 h-px bg-zinc-800"></div>
      <span class="text-xs text-zinc-600">ou</span>
      <div class="flex-1 h-px bg-zinc-800"></div>
    </div>

    <!-- Google OAuth (alunos) -->
    <a href="{% url 'socialaccount_signup' %}"
       class="flex items-center justify-center gap-2 w-full rounded-lg border border-zinc-700
              bg-zinc-900 hover:bg-zinc-800 px-4 py-2 text-sm font-medium text-zinc-300
              transition-colors focus:outline-none focus:ring-2 focus:ring-cyan-500">
      <svg class="w-4 h-4" viewBox="0 0 24 24" aria-hidden="true">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Entrar com Google (alunos)
    </a>

  </div>
</div>
{% endblock %}
