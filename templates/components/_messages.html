{% if messages %}
<div class="px-6 pt-4 space-y-2" aria-live="polite">
  {% for message in messages %}
  <div x-data="{ show: true }"
       x-show="show"
       x-cloak
       x-init="setTimeout(() => show = false, 4000)"
       x-transition:leave="transition ease-in duration-300"
       x-transition:leave-start="opacity-100 translate-y-0"
       x-transition:leave-end="opacity-0 -translate-y-1"
       class="flex items-start justify-between gap-3 rounded-xl px-4 py-3 text-[13px] border
              {% if message.tags == 'error' %}bg-rose-500/8 text-rose-300 border-rose-500/20
              {% elif message.tags == 'success' %}bg-emerald-500/8 text-emerald-300 border-emerald-500/20
              {% elif message.tags == 'warning' %}bg-amber-500/8 text-amber-300 border-amber-500/20
              {% else %}bg-blue-500/8 text-blue-300 border-blue-500/20{% endif %}">
    <span>{{ message }}</span>
    <button @click="show = false" class="shrink-0 opacity-40 hover:opacity-80 transition-opacity mt-0.5">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>
  {% endfor %}
</div>
{% endif %}
