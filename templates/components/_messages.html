{% if messages %}
<div class="px-6 pt-4 space-y-2" aria-live="polite">
  {% for message in messages %}
  <div x-data="{ show: true }"
       x-show="show"
       x-cloak
       x-init="setTimeout(() => show = false, 4000)"
       x-transition:leave="transition ease-in duration-300"
       x-transition:leave-start="opacity-100"
       x-transition:leave-end="opacity-0"
       class="flex items-start justify-between gap-3 rounded-lg px-4 py-3 text-sm border
              {% if message.tags == 'error' %}bg-red-500/10 text-red-400 border-red-500/30
              {% elif message.tags == 'success' %}bg-emerald-500/10 text-emerald-400 border-emerald-500/30
              {% elif message.tags == 'warning' %}bg-amber-500/10 text-amber-400 border-amber-500/30
              {% else %}bg-blue-500/10 text-blue-400 border-blue-500/30{% endif %}">
    <span>{{ message }}</span>
    <button @click="show = false" class="shrink-0 opacity-60 hover:opacity-100">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>
  {% endfor %}
</div>
{% endif %}
