{% if messages %}
<div class="px-6 pt-4 space-y-2" aria-live="polite">
  {% for message in messages %}
  <div x-data="{ show: true }"
       x-show="show"
       x-init="setTimeout(() => show = false, 4000)"
       x-transition:leave="transition ease-in duration-300"
       x-transition:leave-start="opacity-100"
       x-transition:leave-end="opacity-0"
       class="flex items-start justify-between gap-3 rounded-lg px-4 py-3 text-sm
              {% if message.tags == 'error' %}bg-red-50 text-red-700 border border-red-200
              {% elif message.tags == 'success' %}bg-green-50 text-green-700 border border-green-200
              {% elif message.tags == 'warning' %}bg-yellow-50 text-yellow-700 border border-yellow-200
              {% else %}bg-blue-50 text-blue-700 border border-blue-200{% endif %}">
    <span>{{ message }}</span>
    <button @click="show = false" class="shrink-0 opacity-60 hover:opacity-100">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>
  {% endfor %}
</div>
{% endif %}
