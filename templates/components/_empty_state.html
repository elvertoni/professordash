{# Componente de estado vazio reutilizável. #}
{# Parâmetros esperados: icon_path, title, subtitle, action_url, action_label. #}

<div class="bg-[#1a1a2e] rounded-xl border border-dashed border-zinc-700 p-10 sm:p-12 text-center">
  <div class="w-14 h-14 mx-auto mb-4 rounded-xl bg-cyan-500/10 border border-cyan-500/20 flex items-center justify-center">
    <svg class="w-7 h-7 text-cyan-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      {% if icon_path %}
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="{{ icon_path }}"/>
      {% else %}
        {# Ícone padrão: caixa vazia #}
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/>
      {% endif %}
    </svg>
  </div>

  <h3 class="text-sm font-semibold text-[#e4e4f0]">
    {{ title|default:"Nenhum item encontrado" }}
  </h3>

  {% if subtitle %}
    <p class="mt-1 text-sm text-[#8b8ba7]">{{ subtitle }}</p>
  {% endif %}

  {% if action_url %}
    <div class="mt-5">
      <a href="{{ action_url }}"
         class="inline-flex items-center gap-2 bg-cyan-600 hover:bg-cyan-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
        </svg>
        {{ action_label|default:"Criar" }}
      </a>
    </div>
  {% endif %}
</div>
