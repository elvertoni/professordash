{# Componente de estado vazio reutilizável. #}
{# Parâmetros esperados: icon_path, title, subtitle, action_url, action_label. #}

<div class="bg-[#111] rounded-xl border border-dashed border-white/[0.08] p-10 sm:p-14 text-center">
  <div class="w-12 h-12 mx-auto mb-4 rounded-xl bg-white/[0.04] border border-white/[0.07] flex items-center justify-center">
    <svg class="w-6 h-6 text-white/30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      {% if icon_path %}
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="{{ icon_path }}"/>
      {% else %}
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/>
      {% endif %}
    </svg>
  </div>

  <h3 class="text-[13px] font-semibold text-white/70">
    {{ title|default:"Nenhum item encontrado" }}
  </h3>

  {% if subtitle %}
    <p class="mt-1 text-[13px] text-white/35">{{ subtitle }}</p>
  {% endif %}

  {% if action_url %}
    <div class="mt-5">
      <a href="{{ action_url }}"
         class="inline-flex items-center gap-2 bg-white/[0.07] hover:bg-white/[0.12] border border-white/[0.1] hover:border-white/[0.18] text-white/80 hover:text-white text-[13px] font-medium px-4 py-2 rounded-lg transition-all">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
        </svg>
        {{ action_label|default:"Criar" }}
      </a>
    </div>
  {% endif %}
</div>
