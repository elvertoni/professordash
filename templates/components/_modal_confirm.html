{% comment %}
  Modal de confirmação reutilizável via Alpine.js.

  Uso:
    <button @click="$dispatch('modal-confirm', {
        title: 'Excluir aluno',
        message: 'Confirma a remoção do aluno João?',
        formId: 'form-remover-123'
      })">Remover</button>

    <form id="form-remover-123" method="post" action="..." class="hidden">
      {% csrf_token %}
    </form>

    {% include "components/_modal_confirm.html" %}
{% endcomment %}

<div x-data="{
       show: false,
       title: '',
       message: '',
       confirmLabel: 'Confirmar',
       formId: null,
       open(e) {
         this.title        = e.detail.title   || 'Confirmar ação';
         this.message      = e.detail.message || 'Tem certeza que deseja prosseguir?';
         this.confirmLabel = e.detail.confirmLabel || 'Confirmar';
         this.formId       = e.detail.formId  || null;
         this.show = true;
       },
       confirm() {
         if (this.formId) {
           document.getElementById(this.formId).submit();
         }
         this.show = false;
       }
     }"
     @modal-confirm.window="open($event)"
     x-show="show"
     x-cloak
     class="fixed inset-0 z-50 flex items-center justify-center p-4">

  {# Overlay #}
  <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"
       @click="show = false">
  </div>

  {# Card #}
  <div class="relative bg-zinc-900 border border-zinc-700 rounded-2xl shadow-xl w-full max-w-sm p-6 space-y-4"
       x-transition:enter="transition ease-out duration-200"
       x-transition:enter-start="opacity-0 scale-95"
       x-transition:enter-end="opacity-100 scale-100"
       x-transition:leave="transition ease-in duration-150"
       x-transition:leave-start="opacity-100 scale-100"
       x-transition:leave-end="opacity-0 scale-95">

    <div class="flex items-start gap-3">
      <div class="w-10 h-10 rounded-full bg-rose-500/10 border border-rose-500/20 flex items-center justify-center shrink-0">
        <svg class="w-5 h-5 text-rose-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
        </svg>
      </div>
      <div>
        <h3 class="text-base font-semibold text-zinc-100" x-text="title"></h3>
        <p class="text-sm text-zinc-400 mt-1" x-text="message"></p>
      </div>
    </div>

    <div class="flex justify-end gap-3 pt-2">
      <button type="button"
              @click="show = false"
              class="px-4 py-2 text-sm font-medium text-zinc-300 bg-zinc-950 border border-zinc-700 rounded-lg hover:bg-zinc-800 transition-colors">
        Cancelar
      </button>
      <button type="button"
              @click="confirm()"
              class="px-4 py-2 text-sm font-medium text-white bg-rose-600 rounded-lg hover:bg-rose-700 transition-colors">
        <span x-text="confirmLabel"></span>
      </button>
    </div>

  </div>
</div>
