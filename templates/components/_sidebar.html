{% load static %}
<aside class="fixed top-0 left-0 h-full bg-[#0A0A0A] border-r border-zinc-800 z-30 flex flex-col"
       :class="$store.sidebar.collapsed ? 'w-16' : 'w-64'"
       style="transition: width 0.2s">

  <!-- Logo / título -->
  <div class="flex items-center gap-3 px-4 py-5 border-b border-zinc-800/80">
    <div class="w-8 h-8 bg-cyan-500/10 border border-cyan-500/50 rounded-md flex items-center justify-center shrink-0">
      <span class="text-cyan-400 font-bold text-sm" style="text-shadow: 0 0 10px rgba(6, 182, 212, 0.5)">P</span>
    </div>
    <span class="font-bold text-zinc-100 tracking-wide text-sm truncate"
          x-show="!$store.sidebar.collapsed">ProfessorDash</span>
  </div>

  <!-- Navegação -->
  <nav class="flex-1 px-2 py-4 space-y-2 overflow-y-auto">

    <a href="{% url 'core:dashboard' %}"
       class="flex items-center gap-3 px-3 py-2 rounded-md text-sm text-zinc-400 hover:text-cyan-400 hover:bg-zinc-900/50 transition-all duration-200
              {% if request.resolver_match.namespace == 'core' %}bg-zinc-900 text-cyan-400 font-medium border-l-2 border-cyan-400{% endif %}">
      <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3
                 m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
      </svg>
      <span x-show="!$store.sidebar.collapsed">Dashboard</span>
    </a>

    <a href="{% url 'turmas:lista' %}"
       class="flex items-center gap-3 px-3 py-2 rounded-md text-sm text-zinc-400 hover:text-cyan-400 hover:bg-zinc-900/50 transition-all duration-200
              {% if request.resolver_match.namespace == 'turmas' %}bg-zinc-900 text-cyan-400 font-medium border-l-2 border-cyan-400{% endif %}">
      <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9
                 a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
      </svg>
      <span x-show="!$store.sidebar.collapsed">Turmas</span>
    </a>

  </nav>

  <!-- Footer da sidebar -->
  <div class="px-4 py-4 border-t border-zinc-800/80 text-xs text-zinc-500 font-medium uppercase tracking-wider"
       x-show="!$store.sidebar.collapsed">
    Prof. Toni Coimbra
  </div>
</aside>
