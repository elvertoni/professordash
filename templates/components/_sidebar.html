{% load static %}
<aside class="fixed top-0 left-0 h-full bg-white border-r border-gray-200 z-30 flex flex-col"
       :class="$store.sidebar.collapsed ? 'w-16' : 'w-64'"
       style="transition: width 0.2s">

  <!-- Logo / título -->
  <div class="flex items-center gap-3 px-4 py-5 border-b border-gray-100">
    <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center shrink-0">
      <span class="text-white font-bold text-sm">P</span>
    </div>
    <span class="font-semibold text-gray-800 text-sm truncate"
          x-show="!$store.sidebar.collapsed">ProfessorDash</span>
  </div>

  <!-- Navegação -->
  <nav class="flex-1 px-2 py-4 space-y-1 overflow-y-auto">

    <a href="{% url 'core:dashboard' %}"
       class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-gray-700 hover:bg-gray-100
              {% if request.resolver_match.namespace == 'core' %}bg-blue-50 text-blue-700 font-medium{% endif %}">
      <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3
                 m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
      </svg>
      <span x-show="!$store.sidebar.collapsed">Dashboard</span>
    </a>

    <a href="{% url 'turmas:lista' %}"
       class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-gray-700 hover:bg-gray-100
              {% if request.resolver_match.namespace == 'turmas' %}bg-blue-50 text-blue-700 font-medium{% endif %}">
      <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9
                 a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
      </svg>
      <span x-show="!$store.sidebar.collapsed">Turmas</span>
    </a>

  </nav>

  <!-- Footer da sidebar -->
  <div class="px-4 py-3 border-t border-gray-100 text-xs text-gray-400"
       x-show="!$store.sidebar.collapsed">
    Prof. Toni Coimbra
  </div>
</aside>
