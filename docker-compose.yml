version: "3.9"

# Ambiente de desenvolvimento: banco e Redis via Docker, Django roda local
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: professordash_dev
      POSTGRES_USER: prof
      POSTGRES_PASSWORD: prof
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_dev_data:
